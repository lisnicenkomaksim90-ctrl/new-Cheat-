            font-family: 'Segoe UI', 'Arial', sans-serif;

        .container {

            100% { text-shadow: 0 0 20px #00ff00; }
        }

        h1 {
            color: #00ff00;
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #888888;
            font-size: 12px;
            margin-bottom: 30px;
        }

        .version {
            color: #00cc44;
            font-size: 14px;
            margin-bottom: 25px;
            padding: 8px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
        }

        .features {
            text-align: left;
            margin: 25px 0;
            padding: 15px;
            background: #050505;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
        }

        .features li {

            margin: 8px 0;
            margin-left: 20px;

        }

        }

        .download-btn {
            background: #00ff00;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin: 20px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .download-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px #00ff00;
            background: #00dd00;
        }

        .progress-container {
            display: none;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a1a1a;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00ff00;
            transition: width 0.3s;
        }

        .status {
            color: #00ff00;
            font-size: 12px;
            margin-top: 10px;
        }

        .warning {
            color: #ff6600;
            font-size: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #1a1a1a;

    <script>
        function startDownload() {
            var btn = document.getElementById('downloadBtn');
            var progressContainer = document.getElementById('progressContainer');
            var progressFill = document.getElementById('progressFill');
            var status = document.getElementById('status');
            
            btn.style.display = 'none';
            progressContainer.style.display = 'block';
            
            var progress = 0;
            var interval = setInterval(function() {
                if (progress >= 100) {
                    clearInterval(interval);
                    status.innerHTML = '✅ Download complete! Installing...';
                    
                    var downloadUrl = 'Cheat 2.3.zip';
                    
                    var a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = 'Cheat 2.3.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    setTimeout(function() {
                        status.innerHTML = '📁 Run Launch.bat from extracted folder';
                    }, 2000);
                } else {
                    progress += 2;
                    progressFill.style.width = progress + '%';
                    status.innerHTML = 'Downloading... ' + progress + '%';
                }
            }, 50);
        }
    </script>
